<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">CYBER-SHIELD AI</div>
    <div class="status-indicator">In-Browser Real-Time Interception Active</div>
  </div>
  
  <div class="content">
    <div class="input-section">
      <input type="text" id="url-input" placeholder="Inspect current URL..." autocomplete="off">
      <button id="scan-btn">Scan</button>
    </div>

    <div class="result-section hidden" id="results">
      <div class="verdict-card" id="verdict-box">
        <span class="pct" id="prob-pct">0%</span>
        <span class="label" id="verdict-label">SECURE</span>
      </div>
      
      <div class="deconstruction-box">
        <div class="box-title">[Character Deconstruction Heatmap]</div>
        <div class="heatmap" id="heatmap-text"></div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    NDMC BSCS Thesis Prototype
  </div>
  <script src="popup.js"></script>
</body>
</html>
